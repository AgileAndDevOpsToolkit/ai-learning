<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Composants de l'IA Générative</title>
  <link rel="icon" href="images/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <h1>Les composants de l'IA Générative</h1>
    <p class="subtitle">Cliquez sur un composant pour explorer les vidéos associées</p>
    <nav class="site-nav">
      <a class="nav__link nav__link--active" href="index.html" aria-current="page">Composants</a>
      <a class="nav__link" href="vibe-coding.html">Vibe Coding</a>
      <a class="nav__link" href="tests-ia.html">Tests d'IA</a>
      <a class="nav__link" href="ia-locale.html">IA Locale</a>
      <a class="nav__link" href="reflexions.html">Réflexions / Comprendre l'IA</a>
      <a class="nav__link" href="speech-to-text.html">Speech to Text</a>
      <a class="nav__link" href="use-cases.html">Use Cases</a>
    </nav>
  </header>

  <main class="main-layout">

    <!-- ═══ Schéma interactif ═══ -->
    <section class="schema-section">
      <div class="schema">
        <!-- Colonne gauche -->
        <div class="schema__col schema__col--left">
      <button class="cell cell--left" data-sujet="interface-utilisateur" style="--cell-bg: #FFF8E1">
        <img src="images/searching.png" alt="Interface Utilisateur" class="cell__icon" />
        <span class="cell__label">Interface Utilisateur</span>
      </button>
      <button class="cell cell--left" data-sujet="canevas" style="--cell-bg: #FFECB3">
        <img src="images/piano.png" alt="Canevas" class="cell__icon" />
        <span class="cell__label">Canevas</span>
      </button>
      <button class="cell cell--left" data-sujet="api" style="--cell-bg: #FFE082">
        <img src="images/api4.png" alt="API" class="cell__icon" />
        <span class="cell__label">API</span>
      </button>
      <button class="cell cell--left" data-sujet="connecteurs" style="--cell-bg: #FFD54F">
        <img src="images/cable-connector.png" alt="Connecteurs" class="cell__icon" />
        <span class="cell__label">Connecteurs</span>
      </button>
      <button class="cell cell--left" data-sujet="rag" style="--cell-bg: #FFCA28">
        <img src="images/database2.png" alt="RAG" class="cell__icon" />
        <span class="cell__label">RAG</span>
      </button>
      <button class="cell cell--left" data-sujet="custom-gpts" style="--cell-bg: #F5A623">
        <img src="images/custom-chatbot.png" alt="Custom GPTs" class="cell__icon" />
        <span class="cell__label">Custom GPTs</span>
      </button>
      <button class="cell cell--left" data-sujet="agents" style="--cell-bg: #E09000">
        <img src="images/Agent.png" alt="Agents" class="cell__icon" />
        <span class="cell__label">Agents</span>
      </button>

        </div>

        <!-- Centre -->
        <button class="schema__center" data-sujet="moteurs-inference">
          <span class="cell__label">Moteurs d'inférences</span>
          <img src="images/gear.png" alt="Moteurs d'inférences" class="cell__icon cell__icon--center" />
        </button>

        <!-- Colonne droite -->
        <div class="schema__col schema__col--right">
      <button class="cell cell--right" data-sujet="llm">
        <span class="cell__label">LLM</span>
        <img src="images/IA.png" alt="LLM" class="cell__icon" />
      </button>
      <button class="cell cell--right" data-sujet="diffusion-model">
        <span class="cell__label">Diffusion Model</span>
        <img src="images/abstrait.png" alt="Diffusion Model" class="cell__icon" />
      </button>
      <button class="cell cell--right" data-sujet="asr-model">
        <span class="cell__label">ASR Model</span>
        <img src="images/microphone2.png" alt="ASR Model" class="cell__icon" />
      </button>

        </div>
      </div>
    </section>

    <!-- ═══ Zone playlist ═══ -->
    <section class="playlist-section" id="playlistSection">
      <div class="playlist-header" id="playlistHeader">
        <span class="playlist-header__icon">▶</span>
        <span>Sélectionnez un composant pour voir les vidéos</span>
      </div>
      <div class="playlist-container" id="playlistContainer">
        <!-- Les embeds YouTube seront injectés ici -->
      </div>
    </section>

  </main>

  <script>
    const playlists = {
    "llm": {
        "label": "LLM",
        "videos": [
            {
                "youtube_id": "vQL_1mBZbUI",
                "title": "Qu'est-ce qu'un LLM (+ Tuto LM Studio & Huggingface)"
            },
            {
                "youtube_id": "LAWRK5yBPdU",
                "title": "Qu'est-ce que le Fine Tuning ? (explications simples)"
            }
        ]
    },
    "diffusion-model": {
        "label": "Diffusion Model",
        "videos": [
            {
                "youtube_id": "https:\/\/youtu.be\/Iq4zOvDeJFE",
                "title": "Tuto : Je montre comment je fais mes illustrations avec ChatGPT"
            },
            {
                "youtube_id": "LAWRK5yBPdU",
                "title": "Qu'est-ce que le Fine Tuning ? (explications simples)"
            },
            {
                "youtube_id": "VuAA0fnz2OE",
                "title": "ChatGPT a mis à jour sa Génération d'Images et on teste différents modèles de génération d'images accessibles depuis ChatGPT"
            }
        ]
    },
    "asr-model": {
        "label": "ASR Model",
        "videos": [
            {
                "youtube_id": "msbehMVDFeA",
                "title": "On teste la reconnaissance vocale de toutes les IA"
            }
        ]
    },
    "moteurs-inference": {
        "label": "Moteurs d'inférences",
        "videos": [
            {
                "youtube_id": "vQL_1mBZbUI",
                "title": "Qu'est-ce qu'un LLM (+ Tuto LM Studio & Huggingface)"
            }
        ]
    },
    "interface-utilisateur": {
        "label": "Interface Utilisateur",
        "videos": []
    },
    "canevas": {
        "label": "Canevas",
        "videos": []
    },
    "api": {
        "label": "API",
        "videos": [
            {
                "youtube_id": "https:\/\/youtu.be\/MalpJyAwsiI",
                "title": "Qu'est-ce qu'une API ? Quelle est la particularité de l'API ChatGPT ?"
            },
            {
                "youtube_id": "https:\/\/youtu.be\/qNG42lR2wMc",
                "title": "Tuto API ChatGPT"
            }
        ]
    },
    "connecteurs": {
        "label": "Connecteurs",
        "videos": []
    },
    "rag": {
        "label": "RAG",
        "videos": []
    },
    "custom-gpts": {
        "label": "Custom GPTs",
        "videos": [
            {
                "youtube_id": "https:\/\/youtu.be\/yUjk4CKtBpw",
                "title": "Comment Customiser ChatGPT afin qu'il réalise des tâches récurrentes ? | Tutoriel"
            },
            {
                "youtube_id": "https:\/\/youtu.be\/1pKth1Mk3Ss",
                "title": "Tuto Custom GPT : Prompt is Code 💻"
            }
        ]
    },
    "agents": {
        "label": "Agents",
        "videos": []
    }
};

    const container   = document.getElementById('playlistContainer');
    const header      = document.getElementById('playlistHeader');
    const section     = document.getElementById('playlistSection');
    const allCells    = document.querySelectorAll('[data-sujet]');

    let activeSujet = null;

    allCells.forEach(cell => {
      cell.addEventListener('click', () => {
        const sujet = cell.dataset.sujet;

        // Toggle : si on reclique sur le même, on désélectionne
        if (activeSujet === sujet) {
          cell.classList.remove('cell--active');
          activeSujet = null;
          showEmptyState();
          return;
        }

        // Désélectionner l'ancien
        allCells.forEach(c => c.classList.remove('cell--active'));

        // Sélectionner le nouveau
        cell.classList.add('cell--active');
        activeSujet = sujet;

        const playlist = playlists[sujet];
        if (!playlist) return;

        // Header
        header.innerHTML = '<span class="playlist-header__icon">▶</span>' +
          '<span>' + playlist.label + ' — ' + playlist.videos.length + ' vidéo' +
          (playlist.videos.length > 1 ? 's' : '') + '</span>';

        // Vidéos
        if (playlist.videos.length === 0) {
          container.innerHTML = '<p class="playlist-empty">Aucune vidéo disponible pour ce sujet.</p>';
          return;
        }

        container.innerHTML = playlist.videos.map((v, i) => {
          return '<div class="video-card" style="animation-delay: ' + (i * 0.08) + 's">' +
            '<div class="video-card__embed">' +
              '<iframe src="https://www.youtube-nocookie.com/embed/' + extractYoutubeId(v.youtube_id) + '" ' +
                'title="' + escapeHtml(v.title) + '" frameborder="0" ' +
                'allow="autoplay; fullscreen" ' +
                'referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>' +
            '</div>' +
            '<p class="video-card__title">' + escapeHtml(v.title) + '</p>' +
          '</div>';
        }).join('');

        // Scroll vers la playlist sur mobile
        if (window.innerWidth < 1100) {
          section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });

    function showEmptyState() {
      header.innerHTML = '<span class="playlist-header__icon">▶</span>' +
        '<span>Sélectionnez un composant pour voir les vidéos</span>';
      container.innerHTML = '';
    }

    function extractYoutubeId(input) {
      if (input.includes('https://youtu.be/')) {
        return input.split('https://youtu.be/')[1];
      }
      return input;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>

  <footer class="site-footer">
    <p>© 2026 — Les composants de l'IA Générative</p>
  </footer>

</body>
</html>
